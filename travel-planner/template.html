<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip_Plan_Template</title>
    <link rel="stylesheet" href="./vendor/leaflet.css" />
    <script src="./vendor/leaflet.js"></script>
    <script src="./vendor/gcoord.global.prod.js"></script>
    <script src="./vendor/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; display: flex; height: 100vh; overflow: hidden; }
        .left-panel { width: 50%; height: 100%; overflow-y: auto; background: white; padding: 30px; box-sizing: border-box; border-right: 1px solid #e0e0e0; }
        .right-panel { width: 50%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; background: #eef3f7; }

        .markdown-body { font-size: 15px; line-height: 1.6; color: #333; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
        .markdown-body table th, .markdown-body table td { border: 1px solid #dfe2e5; padding: 8px 12px; }
        .markdown-body table th { background-color: #f6f8fa; font-weight: 600; }
        .markdown-body table tr:nth-child(2n) { background-color: #f6f8fa; }
        .markdown-body a { color: #0366d6; text-decoration: none; font-weight: 500; cursor: pointer; }
        .markdown-body a:hover { text-decoration: underline; }

        .loading { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.95); padding: 8px 10px; border-radius: 6px; font-size: 14px; z-index: 1000; box-shadow: 0 1px 6px rgba(0,0,0,0.15); display: none; max-width: calc(100% - 24px); }
        .issues { position: absolute; bottom: 12px; left: 12px; right: 12px; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px 12px; box-shadow: 0 1px 10px rgba(0,0,0,0.12); z-index: 1000; display: none; max-height: 30vh; overflow-y: auto;}
        .issues-title { font-weight: 600; margin-bottom: 6px; color: #e74c3c;}
        .issues ul { margin: 0; padding-left: 18px; }
        .issues li { margin: 4px 0; font-size: 13px;}
        .issues a { font-weight: 600; color: #0366d6; text-decoration: none;}

        #fatal-error { position: fixed; inset: 0; background: rgba(255,255,255,0.96); display: none; z-index: 9999; padding: 24px; box-sizing: border-box; }
        #fatal-error pre { white-space: pre-wrap; word-break: break-word; background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; overflow: auto; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div id="content" class="markdown-body"></div>
    </div>
    <div class="right-panel">
        <div id="loading" class="loading">正在智能检索地图坐标…</div>
        <div id="issues" class="issues"></div>
        <div id="map"></div>
    </div>

    <div id="fatal-error">
        <h2>页面加载失败</h2>
        <p>资源加载被拦截或出现脚本错误。</p>
        <pre id="fatal-error-text"></pre>
    </div>

    <script>
const markdownContent = `MARKDOWN_CONTENT_PLACEHOLDER`;
// initialDays 格式：[["Day1景点A", "Day1景点B"], ["Day2景点C"]]
const initialDays = INITIAL_DAYS_PLACEHOLDER;

try {
    document.getElementById('content').innerHTML = marked.parse(markdownContent);
} catch (e) {
    showFatalError(e);
}

const map = L.map('map').setView([39.9, 116.4], 4);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    subdomains: ["1", "2", "3", "4"],
    maxZoom: 18,
    attribution: '© 高德地图'
}).addTo(map);

const dayColors = ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#e74c3c', '#1abc9c', '#34495e'];

function createDayIcon(dayIndex, color) {
    return L.divIcon({
        className: 'custom-div-icon',
        html: `<div style="background-color:${color}; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3);">D${dayIndex + 1}</div>`,
        iconSize: [30, 30],
        iconAnchor: [15, 15]
    });
}

const cacheKey = 'travel-planner:geo-cache:v2';
const cache = (() => {
    try { return JSON.parse(localStorage.getItem(cacheKey) || '{}') || {}; } 
    catch { return {}; }
})();

function saveCache() {
    try { localStorage.setItem(cacheKey, JSON.stringify(cache)); } 
    catch {}
}

const markersMap = {};
const allLatlngs = [];
let pendingTasks = 0;

function setLoading(text) {
    const el = document.getElementById('loading');
    el.style.display = 'block';
    el.textContent = text;
}
function clearLoading() {
    if (pendingTasks <= 0) document.getElementById('loading').style.display = 'none';
}
function showIssues(unresolved) {
    const el = document.getElementById('issues');
    if (!unresolved.length) {
        el.style.display = 'none';
        return;
    }
    const items = unresolved.map((name) => {
        const q = encodeURIComponent(name.replace(/\s+/g, '+'));
        const href = `https://ditu.amap.com/search?query=${q}`;
        return `<li>${name}（<a href="${href}" target="_blank" rel="noopener noreferrer">在高德打开</a>）</li>`;
    }).join('');
    el.innerHTML = `<div class="issues-title">以下景点未能自动定位：</div><ul>${items}</ul>`;
    el.style.display = 'block';
}
function showFatalError(e) {
    const fatal = document.getElementById('fatal-error');
    if (!fatal) return;
    fatal.style.display = 'block';
    document.getElementById('fatal-error-text').textContent = e && e.stack ? e.stack : String(e);
}

function normalizeQuery(q) {
    return String(q || '').replace(/\+/g, ' ').replace(/\s+/g, ' ').trim();
}

function candidateQueries(queryName) {
    const q = normalizeQuery(queryName);
    const variants = [q];
    variants.push(q.replace(/历史文化街区|文化旅游区|风情区|风景名胜区|风景区|旅游区|遗址/g, ''));
    let pureMatch = q.match(/.*?(区|县|市)\s+(.*)/);
    if(pureMatch && pureMatch[2]) variants.push(pureMatch[2].trim());
    const unique = [];
    for (const item of variants) {
        const v = normalizeQuery(item);
        if (v && !unique.includes(v)) unique.push(v);
    }
    return unique;
}

async function fetchPhoton(q) {
    try {
        const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=1`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        if (!data.features || !data.features.length) return null;
        const coords = data.features[0].geometry.coordinates;
        return { lon: coords[0], lat: coords[1] };
    } catch { return null; }
}

async function resolveToGcj02(queryName) {
    const q = normalizeQuery(queryName);
    if (cache[q] && cache[q].lon && cache[q].lat) return cache[q];
    const candidates = candidateQueries(q);
    for (const c of candidates) {
        const hit = await fetchPhoton(c);
        if (hit) {
            const gcj = gcoord.transform([hit.lon, hit.lat], gcoord.WGS84, gcoord.GCJ02);
            cache[q] = { lon: gcj[0], lat: gcj[1] };
            saveCache();
            return cache[q];
        }
    }
    return null;
}

async function loadInitialRoute() {
    if (!Array.isArray(initialDays) || initialDays.length === 0) return;
    const unresolved = [];
    pendingTasks++;
    setLoading('正在检索地图坐标…');
    
    for (let d = 0; d < initialDays.length; d++) {
        const dayPlaces = initialDays[d];
        const dayLatlngs = [];
        const color = dayColors[d % dayColors.length];
        
        for (const placeName of dayPlaces) {
            const r = await resolveToGcj02(placeName);
            if (!r) {
                unresolved.push(placeName);
                continue;
            }
            const pos = [r.lat, r.lon];
            const marker = L.marker(pos, { icon: createDayIcon(d, color) }).addTo(map);
            marker.bindPopup(`<b>Day ${d+1}: ${placeName.replace(/.*?(区|县|市)\s+/, '').trim()}</b>`);
            markersMap[normalizeQuery(placeName)] = marker;
            dayLatlngs.push(pos);
            allLatlngs.push(pos);
        }
        
        if (dayLatlngs.length > 1) {
            L.polyline(dayLatlngs, { color: color, weight: 4, opacity: 0.8 }).addTo(map);
        }
    }
    
    if (allLatlngs.length > 0) {
        map.fitBounds(L.latLngBounds(allLatlngs), { padding: [50, 50] });
    }
    showIssues(unresolved);
    pendingTasks--;
    clearLoading();
}

async function focusAndPlotPlace(queryName) {
    const normalized = normalizeQuery(queryName);
    if (markersMap[normalized]) {
        map.flyTo(markersMap[normalized].getLatLng(), 16, {duration: 1.5});
        setTimeout(() => markersMap[normalized].openPopup(), 1500);
        return;
    }
    pendingTasks++;
    setLoading(`正在定位：${normalized.replace(/.*?(区|县|市)\s+/, '').trim()}…`);
    const r = await resolveToGcj02(normalized);
    pendingTasks--;
    clearLoading();
    if (!r) {
        window.open(`https://ditu.amap.com/search?query=${encodeURIComponent(normalized.replace(/\s+/g, '+'))}`, '_blank');
        return;
    }
    const pos = [r.lat, r.lon];
    const marker = L.marker(pos).addTo(map);
    marker.bindPopup(`<b>${normalized.replace(/.*?(区|县|市)\s+/, '').trim()}</b>`);
    markersMap[normalized] = marker;
    map.flyTo(pos, 16, {duration: 1.5});
    setTimeout(() => marker.openPopup(), 1500);
}

document.querySelectorAll('.markdown-body a').forEach((a) => {
    if (!a.href.includes('amap.com') && !a.href.includes('google.com/maps')) return;
    a.addEventListener('click', function (e) {
        e.preventDefault();
        const urlObj = new URL(this.href);
        const q = urlObj.searchParams.get('query') || urlObj.searchParams.get('q');
        if (q) focusAndPlotPlace(q);
        else window.open(this.href, '_blank');
    });
});

window.addEventListener('error', (event) => showFatalError(event.error || event));
window.addEventListener('unhandledrejection', (event) => showFatalError(event.reason || event));
loadInitialRoute();
    </script>
</body>
</html>
