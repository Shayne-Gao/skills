<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip Plan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/gcoord@0.3.2/dist/gcoord.js"></script>
    <script src="https://unpkg.com/marked@12.0.0/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; display: flex; height: 100vh; overflow: hidden; }
        .left-panel { width: 45%; height: 100%; overflow-y: auto; background: white; padding: 30px; box-sizing: border-box; border-right: 1px solid #e0e0e0; }
        .right-panel { width: 55%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; background: #eef3f7; }

        .markdown-body { font-size: 15px; line-height: 1.6; color: #333; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
        .markdown-body table th, .markdown-body table td { border: 1px solid #dfe2e5; padding: 8px 12px; }
        .markdown-body table th { background-color: #f6f8fa; font-weight: 600; }
        .markdown-body table tr:nth-child(2n) { background-color: #f6f8fa; }
        .markdown-body a { color: #0366d6; text-decoration: none; font-weight: 500; cursor: pointer; }
        .markdown-body a:hover { text-decoration: underline; }

        .loading { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.95); padding: 8px 10px; border-radius: 6px; font-size: 14px; z-index: 1000; box-shadow: 0 1px 6px rgba(0,0,0,0.15); display: none; max-width: calc(100% - 24px); }
        .issues { position: absolute; bottom: 12px; left: 12px; right: 12px; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px 12px; box-shadow: 0 1px 10px rgba(0,0,0,0.12); z-index: 1000; display: none; max-height: 30vh; overflow-y: auto;}
        
        #fatal-error { position: fixed; inset: 0; background: rgba(255,255,255,0.96); display: none; z-index: 9999; padding: 24px; box-sizing: border-box; }
        #fatal-error pre { white-space: pre-wrap; word-break: break-word; background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; overflow: auto; }

        .extras-section { margin-top: 28px; padding-top: 18px; border-top: 1px solid #eaecef; }
        .extras-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .extras-title { font-size: 18px; font-weight: 700; margin: 0; }
        .extras-subtitle { font-size: 13px; color: #6b7280; margin: 0; }
        .extras-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .extras-tab { border: 1px solid #e5e7eb; background: #fff; border-radius: 999px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
        .extras-tab.active { background: #111827; color: #fff; border-color: #111827; }
        .extras-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .extras-card { border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; background: #fff; display: flex; flex-direction: column; min-height: 180px; }
        .extras-img { width: 100%; height: 120px; object-fit: cover; background: #f3f4f6; }
        .extras-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
        .extras-row { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
        .extras-name { font-weight: 700; font-size: 14px; line-height: 1.2; margin: 0; }
        .extras-price { font-size: 13px; color: #111827; white-space: nowrap; }
        .extras-desc { font-size: 13px; color: #374151; margin: 0; }
        .extras-meta { font-size: 12px; color: #6b7280; margin: 0; }
        .extras-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .extras-tag { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: #f3f4f6; color: #374151; }
        .extras-actions { display: flex; gap: 10px; margin-top: 6px; }
        .extras-link { font-size: 13px; color: #0366d6; text-decoration: none; }
        .extras-link:hover { text-decoration: underline; }

        @media (max-width: 900px) {
            body { flex-direction: column; height: 100vh; overflow: hidden; }
            .right-panel { order: 0; width: 100%; height: 45vh; flex: 0 0 45vh; }
            #map { height: 100%; }
            .left-panel { order: 1; width: 100%; height: auto; flex: 1 1 auto; overflow-y: auto; border-right: none; border-top: 1px solid #e0e0e0; padding: 18px; }
            .extras-grid { grid-template-columns: 1fr; }
        }

        body.force-mobile { flex-direction: column; height: 100vh; overflow: hidden; }
        body.force-mobile .right-panel { order: 0; width: 100%; height: 45vh; flex: 0 0 45vh; }
        body.force-mobile #map { height: 100%; }
        body.force-mobile .left-panel { order: 1; width: 100%; height: auto; flex: 1 1 auto; overflow-y: auto; border-right: none; border-top: 1px solid #e0e0e0; padding: 18px; }
        body.force-mobile .extras-grid { grid-template-columns: 1fr; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div id="content" class="markdown-body"></div>
    </div>
    <div class="right-panel">
        <div id="loading" class="loading">正在智能检索地图坐标…</div>
        <div id="issues" class="issues"></div>
        <div id="map"></div>
    </div>

    <div id="fatal-error">
        <h2>页面加载失败</h2>
        <pre id="fatal-error-text"></pre>
    </div>

    <script id="extras-data" type="application/json">EXTRAS_JSON</script>

    <script>
(function() {
    try {
        if (new URLSearchParams(location.search).get('mobile') === '1') document.body.classList.add('force-mobile');
    } catch {}
    const markdownContent = MARKDOWN_CONTENT_JSON;
    const initialDays = INITIAL_DAYS_JSON;

    let locationBias = null;
    let cityToken = null;
    let biasMode = 'none';
    let hardBbox = null;
    let hardAnchor = null;
    const DEBUG = (() => {
        try { return new URLSearchParams(location.search).get('debug') === '1'; } catch { return false; }
    })();

    function showFatalError(e) {
        const fatal = document.getElementById('fatal-error');
        if (!fatal) return;
        fatal.style.display = 'block';
        document.getElementById('fatal-error-text').textContent = e && e.stack ? e.stack : String(e);
    }

    function readExtras() {
        const el = document.getElementById('extras-data');
        if (!el) return [];
        try {
            const text = (el.textContent || '').trim();
            if (!text || (text[0] !== '[' && text[0] !== '{')) return [];
            const parsed = JSON.parse(text);
            return Array.isArray(parsed) ? parsed : [];
        } catch {
            return [];
        }
    }

    function escapeHtml(s) {
        return String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function normalizeExtrasType(t) {
        const v = String(t || '').toLowerCase();
        if (v.includes('food') || v.includes('美食') || v.includes('小吃') || v.includes('餐')) return 'food';
        if (v.includes('souvenir') || v.includes('伴手礼') || v.includes('礼') || v.includes('特产')) return 'souvenir';
        return 'all';
    }

    function placeholderDataUrl(title) {
        const t = String(title || '').trim().slice(0, 12) || '图片';
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#e5e7eb"/><stop offset="1" stop-color="#f3f4f6"/></linearGradient></defs><rect width="100%" height="100%" fill="url(#g)"/><text x="50%" y="52%" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial" font-size="40" fill="#111827">${escapeHtml(t)}</text></svg>`;
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function renderExtras(items) {
        const list = Array.isArray(items) ? items.filter(Boolean) : [];
        if (!list.length) return;
        const content = document.getElementById('content');
        if (!content) return;

        const section = document.createElement('section');
        section.className = 'extras-section';

        const header = document.createElement('div');
        header.className = 'extras-header';

        const titleWrap = document.createElement('div');
        const title = document.createElement('h2');
        title.className = 'extras-title';
        title.textContent = '美食与伴手礼';
        const subtitle = document.createElement('p');
        subtitle.className = 'extras-subtitle';
        subtitle.textContent = '仅供参考：图片/价格可能随季节与店铺变动';
        titleWrap.appendChild(title);
        titleWrap.appendChild(subtitle);

        const tabs = document.createElement('div');
        tabs.className = 'extras-tabs';
        const tabAll = document.createElement('button');
        tabAll.className = 'extras-tab active';
        tabAll.type = 'button';
        tabAll.textContent = '全部';
        const tabFood = document.createElement('button');
        tabFood.className = 'extras-tab';
        tabFood.type = 'button';
        tabFood.textContent = '美食';
        const tabSouvenir = document.createElement('button');
        tabSouvenir.className = 'extras-tab';
        tabSouvenir.type = 'button';
        tabSouvenir.textContent = '伴手礼';
        tabs.appendChild(tabAll);
        tabs.appendChild(tabFood);
        tabs.appendChild(tabSouvenir);

        header.appendChild(titleWrap);
        header.appendChild(tabs);
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'extras-grid';
        section.appendChild(grid);
        content.appendChild(section);

        function setActive(btn) {
            for (const b of tabs.querySelectorAll('button')) b.classList.remove('active');
            btn.classList.add('active');
        }

        function render(type) {
            grid.innerHTML = '';
            const filtered = type === 'all' ? list : list.filter(i => normalizeExtrasType(i.type || i.category) === type);
            for (const item of filtered) {
                const name = escapeHtml(item.name);
                const price = escapeHtml(item.price || item.priceRange || '');
                const desc = escapeHtml(item.desc || item.description || '');
                const where = escapeHtml(item.where || item.location || '');
                const image = String(item.image || item.imageUrl || '').trim();
                const tags = Array.isArray(item.tags) ? item.tags.slice(0, 6).map(t => String(t)) : [];
                const mapUrl = String(item.mapUrl || item.map || '').trim();

                const card = document.createElement('article');
                card.className = 'extras-card';

                const img = document.createElement('img');
                img.className = 'extras-img';
                img.loading = 'lazy';
                img.alt = name;
                try { img.referrerPolicy = 'no-referrer'; } catch {}
                const fallback = placeholderDataUrl(item.name || '');
                img.src = image || fallback;
                img.onerror = () => {
                    img.onerror = null;
                    img.src = fallback;
                };
                card.appendChild(img);

                const body = document.createElement('div');
                body.className = 'extras-body';

                const row = document.createElement('div');
                row.className = 'extras-row';
                const h = document.createElement('h3');
                h.className = 'extras-name';
                h.textContent = item.name || '';
                const p = document.createElement('div');
                p.className = 'extras-price';
                p.textContent = price ? `参考价：${price}` : '';
                row.appendChild(h);
                row.appendChild(p);
                body.appendChild(row);

                if (desc) {
                    const d = document.createElement('p');
                    d.className = 'extras-desc';
                    d.textContent = item.desc || item.description || '';
                    body.appendChild(d);
                }

                if (where) {
                    const m = document.createElement('p');
                    m.className = 'extras-meta';
                    m.textContent = `推荐购买：${item.where || item.location}`;
                    body.appendChild(m);
                }

                if (tags.length) {
                    const tagWrap = document.createElement('div');
                    tagWrap.className = 'extras-tags';
                    for (const t of tags) {
                        const s = document.createElement('span');
                        s.className = 'extras-tag';
                        s.textContent = t;
                        tagWrap.appendChild(s);
                    }
                    body.appendChild(tagWrap);
                }

                if (mapUrl) {
                    const actions = document.createElement('div');
                    actions.className = 'extras-actions';
                    const link = document.createElement('a');
                    link.className = 'extras-link';
                    link.href = mapUrl;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    link.textContent = '🗺️ 查看地图';
                    actions.appendChild(link);
                    body.appendChild(actions);
                }

                card.appendChild(body);
                grid.appendChild(card);
            }
        }

        tabAll.addEventListener('click', () => { setActive(tabAll); render('all'); });
        tabFood.addEventListener('click', () => { setActive(tabFood); render('food'); });
        tabSouvenir.addEventListener('click', () => { setActive(tabSouvenir); render('souvenir'); });
        render('all');
    }

    async function init() {
        try {
            if (typeof L === 'undefined' || typeof gcoord === 'undefined' || typeof marked === 'undefined') {
                throw new Error('缺少关键资源。请确保联网以访问 CDN。');
            }

            document.getElementById('content').innerHTML = marked.parse(markdownContent);
            renderExtras(readExtras());

            const map = L.map('map').setView([39.9, 116.4], 4);
            L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                subdomains: ["1", "2", "3", "4"],
                maxZoom: 18,
                attribution: '© 高德地图'
            }).addTo(map);

            const dayColors = ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#e74c3c', '#1abc9c', '#34495e'];
            const markersMap = {};
            const allLatlngs = [];
            const cacheKey = 'travel-planner:geo-cache:v18';
            const cache = (() => {
                try { return JSON.parse(localStorage.getItem(cacheKey) || '{}') || {}; } catch { return {}; }
            })();
            const districtBiases = {};

            function saveCache() {
                try { localStorage.setItem(cacheKey, JSON.stringify(cache)); } catch {}
            }

            function normalize(s) {
                return String(s || '').replace(/\+/g, ' ').replace(/\s+/g, '').replace(/福建省|泉州市|鲤城区|晋江市|市|区|县|历史文化街区|文化旅游区|风景区|遗址|传统街区/g, '').toLowerCase().trim();
            }

            const CITY_RULES = {
                '泉州': {
                    anchor: { lat: 24.87389, lon: 118.67584 },
                    bbox: { minLat: 24.35, maxLat: 25.65, minLon: 117.40, maxLon: 119.20 }
                }
            };

            function extractCityToken(days) {
                if (!Array.isArray(days)) return null;
                for (const day of days) {
                    if (!Array.isArray(day)) continue;
                    for (const name of day) {
                        const s = String(name || '');
                        const m = s.match(/(.{2,12}?(市|盟|地区|县))/);
                        if (m && m[1]) return m[1];
                    }
                }
                return null;
            }

            function inBbox(p, bbox) {
                if (!bbox) return true;
                return p.lat >= bbox.minLat && p.lat <= bbox.maxLat && p.lon >= bbox.minLon && p.lon <= bbox.maxLon;
            }

            function haversineKm(a, b) {
                const toRad = (deg) => deg * Math.PI / 180;
                const R = 6371;
                const dLat = toRad(b.lat - a.lat);
                const dLon = toRad(b.lon - a.lon);
                const lat1 = toRad(a.lat);
                const lat2 = toRad(b.lat);
                const s = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * (Math.sin(dLon / 2) ** 2);
                return 2 * R * Math.asin(Math.sqrt(s));
            }

            function createDayIcon(dayIndex, color) {
                return L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background-color:${color}; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3);">D${dayIndex + 1}</div>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                });
            }

            async function fetchPhoton(q, bias = null, requiredCity = null, requiredDistrict = null) {
                try {
                    let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=10`;
                    const ref = bias || hardAnchor || locationBias || null;
                    if (ref) url += `&lat=${ref.lat}&lon=${ref.lon}&location_bias_scale=0.8`;
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), 8000);
                    const res = await fetch(url, { signal: controller.signal });
                    clearTimeout(timer);
                    const data = await res.json();
                    if (!data.features?.length) return null;

                    const wantCity = requiredCity ? String(requiredCity) : '';
                    const wantDistrict = requiredDistrict ? String(requiredDistrict) : '';
                    if (DEBUG && (q.includes('白塔寺') || q.includes('西街'))) {
                        const p0 = data.features[0]?.properties || {};
                        console.log('[geo]', JSON.stringify({ q, wantCity, wantDistrict, p0: { name: p0.name, city: p0.city, county: p0.county, state: p0.state, district: p0.district } }));
                    }

                    let best = null;
                    let bestScore = Infinity;
                    let passed = 0;

                    for (const f of data.features) {
                        const c = f?.geometry?.coordinates;
                        if (!c || c.length < 2) continue;
                        const props = f.properties || {};
                        const cand = { lon: c[0], lat: c[1] };
                        if (!inBbox(cand, hardBbox)) continue;
                        const dist = ref ? haversineKm(ref, cand) : 0;

                        const meta = `${props.name || ''} ${props.city || ''} ${props.county || ''} ${props.state || ''} ${props.district || ''}`;
                        if (wantDistrict) {
                            const districtMeta = `${props.county || ''} ${props.district || ''}`;
                            const hasDistrictZh = /[\u4e00-\u9fff]/.test(districtMeta);
                            if (hasDistrictZh) {
                                const okDistrict = meta.includes(wantDistrict) || meta.includes(`${wantDistrict}区`) || meta.includes(`${wantDistrict}县`);
                                if (!okDistrict) continue;
                            }
                        } else if (wantCity) {
                            const cityMeta = `${props.state || ''} ${props.city || ''} ${props.county || ''}`;
                            const hasCityZh = /[\u4e00-\u9fff]/.test(cityMeta);
                            if (hasCityZh) {
                                const okCity = meta.includes(wantCity) || meta.includes(`${wantCity}市`);
                                if (!okCity) continue;
                            }
                        }
                        passed += 1;
                        const cityBonus = wantCity && meta.includes(wantCity) ? 10 : 0;
                        const districtBonus = wantDistrict && (meta.includes(wantDistrict) || meta.includes(`${wantDistrict}区`) || meta.includes(`${wantDistrict}县`)) ? 5 : 0;
                        const score = dist - cityBonus - districtBonus;

                        if (score < bestScore) {
                            bestScore = score;
                            best = cand;
                        }
                    }

                    if (DEBUG && (q.includes('白塔寺') || q.includes('西街'))) {
                        console.log('[geo]', JSON.stringify({ q, passed, best }));
                    }
                    return best;
                } catch { return null; }
            }

            async function resolveToGcj02(query) {
                const q = query.replace(/\+/g, ' ').trim();
                if (cache[q]) return cache[q];

                const afterCity = q.replace(/^.*?(市|盟|地区|县)/, '');
                const mDistrictToken = afterCity.match(/^[^\s]{2,12}?(区|县)/);
                const districtToken = mDistrictToken ? mDistrictToken[0] : '';
                const baseNameFull = q
                    .replace(/^.*?(市|盟|地区|县)/, '')
                    .replace(/^.*?(区|县)/, '')
                    .trim();
                const baseName = baseNameFull
                    .replace(/历史文化街区|文化旅游区|旅游区|风景名胜区|风景区|遗址|传统街区/g, '')
                    .trim();
                const cityCompact = String(cityToken || '').replace(/\s+/g, '');
                const cityShort = cityCompact.endsWith('市') ? cityCompact.slice(0, -1) : cityCompact;
                const districtCompact = String(districtToken || '').replace(/\s+/g, '');
                const districtShort = districtCompact.replace(/(区|县)$/g, '');

                let searchBias = locationBias;
                if (districtToken && cityShort) {
                    const key = districtToken;
                    if (!(key in districtBiases)) {
                        const dhit = await fetchPhoton(`${districtToken} ${cityShort}`, locationBias, null, null);
                        districtBiases[key] = dhit || null;
                    }
                    if (districtBiases[key]) searchBias = districtBiases[key];
                }

                let coreName = baseName;
                const mCity = coreName.match(/^[^\s]{2,12}?(市|盟|地区|县)(.+)$/);
                if (mCity && mCity[2]) coreName = mCity[2].trim();
                const mDistrict = coreName.match(/^[^\s]{2,12}?(区|县)(.+)$/);
                if (mDistrict && mDistrict[2]) coreName = mDistrict[2].trim();
                const coreCompact = coreName.replace(/\s+/g, '');

                const cityTokens = q.match(/[^\s]{2,12}?市/g) || [];
                const subCityToken = cityTokens.length >= 2 ? cityTokens[1] : '';
                const subCityShort = subCityToken.replace(/市$/g, '');

                const coreNoCityCompact = (cityShort && coreCompact.startsWith(cityShort)) ? coreCompact.slice(cityShort.length) : '';
                const coreNoCityName = (cityShort && coreName.startsWith(cityShort)) ? coreName.slice(cityShort.length) : '';

                const forced = [];
                if (q.includes('五店市')) {
                    forced.push('五店市 泉州');
                    forced.push('五店市 晋江');
                }

                const candidates = [
                    ...forced,
                    q,
                    coreName && districtShort ? `${coreName} ${districtShort}` : null,
                    coreName && cityShort ? `${coreName} ${cityShort}` : null,
                    baseName && districtShort ? `${baseName} ${districtShort}` : null,
                    baseName && cityShort ? `${baseName} ${cityShort}` : null,
                    baseNameFull && districtShort ? `${baseNameFull} ${districtShort}` : null,
                    baseNameFull && cityShort ? `${baseNameFull} ${cityShort}` : null,
                ];
                
                const unique = Array.from(new Set(candidates.filter(i => typeof i === 'string' && i.trim().length > 2).map(i => i.trim())));

                for (const c of unique) {
                    const hit = await fetchPhoton(c, searchBias, cityShort || null, districtShort || null);
                    if (hit) {
                        const distRef = searchBias || locationBias;
                        if (distRef) {
                            const dist = haversineKm(distRef, hit);
                            const maxDist = hardBbox ? 220 : (districtToken ? 140 : (districtShort ? 220 : 60));
                            if (dist > maxDist) continue;
                        }
                        const gcj = gcoord.transform([hit.lon, hit.lat], gcoord.WGS84, gcoord.GCJ02);
                        const result = { lon: gcj[0], lat: gcj[1] };
                        if (biasMode !== 'route') {
                            locationBias = { lat: hit.lat, lon: hit.lon };
                            biasMode = 'route';
                        }
                        cache[q] = result;
                        saveCache();
                        return result;
                    }
                }
                return null;
            }

            if (initialDays?.length) {
                cityToken = extractCityToken(initialDays);
                if (cityToken) {
                    const cityCompact = String(cityToken || '').replace(/\s+/g, '');
                    const cityShort = cityCompact.endsWith('市') ? cityCompact.slice(0, -1) : cityCompact;
                    const rule = CITY_RULES[cityShort] || null;
                    if (rule) {
                        hardAnchor = rule.anchor;
                        hardBbox = rule.bbox;
                        locationBias = { ...rule.anchor };
                        biasMode = 'city';
                    } else {
                        const cityHit = await fetchPhoton(cityToken, null, null, null);
                        if (cityHit) {
                            locationBias = { lat: cityHit.lat, lon: cityHit.lon };
                            biasMode = 'city';
                        }
                    }
                }

                document.getElementById('loading').style.display = 'block';
                const unresolved = [];
                for (let d = 0; d < initialDays.length; d++) {
                    const color = dayColors[d % dayColors.length];
                    const dayPoints = [];
                    for (const name of initialDays[d]) {
                        const r = await resolveToGcj02(name);
                        if (r) {
                            const pos = [r.lat, r.lon];
                            const marker = L.marker(pos, { icon: createDayIcon(d, color) }).addTo(map);
                            marker.bindPopup(`<b>D${d+1}: ${name}</b>`);
                            markersMap[normalize(name)] = marker;
                            dayPoints.push(pos);
                            allLatlngs.push(pos);
                        } else {
                            unresolved.push(name);
                        }
                    }
                    if (dayPoints.length > 1) L.polyline(dayPoints, { color, weight: 4, opacity: 0.7 }).addTo(map);
                }
                if (allLatlngs.length) map.fitBounds(allLatlngs, { padding: [50, 50] });
                document.getElementById('loading').style.display = 'none';

                if (unresolved.length) {
                    const el = document.getElementById('issues');
                    el.innerHTML = `<div class="issues-title">以下地点未能定位（因此无法连线）：</div><ul>${unresolved.map(n => `<li>${n}</li>`).join('')}</ul>`;
                    el.style.display = 'block';
                }
            }

            document.getElementById('content').addEventListener('click', async e => {
                const a = e.target.closest('a');
                if (!a) return;

                const isExternal = a.textContent.includes('🗺️') || a.textContent.toLowerCase().includes('map');
                const isMapLink = a.href.includes('amap.com') || a.href.includes('google.com/maps');

                if (isMapLink) {
                    if (!isExternal) {
                        e.preventDefault();
                        const query = new URL(a.href).searchParams.get('query') || new URL(a.href).searchParams.get('q');
                        if (!query) return;

                        const norm = normalize(query);
                        let target = markersMap[norm];
                        if (!target) {
                            const match = Object.keys(markersMap).find(k => k.includes(norm) || norm.includes(k));
                            if (match) target = markersMap[match];
                        }

                        if (target) {
                            map.flyTo(target.getLatLng(), 16);
                            setTimeout(() => target.openPopup(), 400);
                        } else {
                            document.getElementById('loading').textContent = '正在临时定位...';
                            document.getElementById('loading').style.display = 'block';
                            const r = await resolveToGcj02(query);
                            document.getElementById('loading').style.display = 'none';
                            if (r) {
                                const marker = L.marker([r.lat, r.lon]).addTo(map);
                                marker.bindPopup(`<b>${query}</b>`).openPopup();
                                map.flyTo([r.lat, r.lon], 16);
                            }
                        }
                    } else {
                        a.target = "_blank";
                    }
                }
            });

        } catch (e) { showFatalError(e); }
    }

    if (document.readyState === 'complete') init();
    else window.addEventListener('load', init);
})();
    </script>
</body>
</html>
