<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip Plan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/gcoord@0.3.2/dist/gcoord.js"></script>
    <script src="https://unpkg.com/marked@12.0.0/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; display: flex; height: 100vh; overflow: hidden; }
        .left-panel { width: 45%; height: 100%; overflow-y: auto; background: white; padding: 30px; box-sizing: border-box; border-right: 1px solid #e0e0e0; }
        .right-panel { width: 55%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; background: #eef3f7; }

        .markdown-body { font-size: 15px; line-height: 1.6; color: #333; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
        .markdown-body table th, .markdown-body table td { border: 1px solid #dfe2e5; padding: 8px 12px; }
        .markdown-body table th { background-color: #f6f8fa; font-weight: 600; }
        .markdown-body table tr:nth-child(2n) { background-color: #f6f8fa; }
        .markdown-body a { color: #0366d6; text-decoration: none; font-weight: 500; cursor: pointer; }
        .markdown-body a:hover { text-decoration: underline; }

        .candidate-toolbar { position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,0.96); backdrop-filter: blur(6px); border: 1px solid #e5e7eb; border-radius: 12px; padding: 10px 12px; margin: 12px 0 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
        .candidate-toolbar .hint { font-size: 13px; color: #374151; }
        .candidate-toolbar .actions { display: flex; flex-wrap: wrap; gap: 8px; }
        .candidate-btn { appearance: none; border: 1px solid #d1d5db; background: #fff; color: #111827; border-radius: 10px; padding: 7px 10px; font-size: 13px; cursor: pointer; }
        .candidate-btn.primary { background: #111827; border-color: #111827; color: #fff; }
        .candidate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .candidate-area { margin-top: 18px; }
        .candidate-area-title { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin: 0 0 10px; }
        .candidate-area-title .name { font-size: 18px; font-weight: 800; margin: 0; }
        .candidate-area-title .meta { font-size: 13px; color: #6b7280; }

        .candidate-list { display: flex; flex-direction: column; gap: 12px; }
        .candidate-card { border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px 12px; background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
        .candidate-card.candidate-must { border-color: #86efac; background: linear-gradient(0deg, rgba(240,253,244,0.8), rgba(240,253,244,0.8)), #fff; }
        .candidate-card.candidate-avoid { border-color: #fca5a5; background: linear-gradient(0deg, rgba(254,242,242,0.9), rgba(254,242,242,0.9)), #fff; }
        .candidate-top { display: flex; gap: 10px; align-items: flex-start; justify-content: space-between; }
        .candidate-title { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .candidate-index { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 999px; background: #111827; color: #fff; font-weight: 800; font-size: 13px; flex: 0 0 auto; }
        .candidate-name { font-weight: 800; font-size: 15px; color: #111827; }
        .candidate-rating { font-size: 13px; font-weight: 700; color: #111827; white-space: nowrap; }
        .candidate-actions { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .candidate-pillbtn { appearance: none; border: 1px solid #d1d5db; background: rgba(255,255,255,0.9); color: #111827; border-radius: 999px; padding: 5px 10px; font-size: 12px; cursor: pointer; line-height: 1; }
        .candidate-pillbtn.must.active { background: #16a34a; border-color: #16a34a; color: #fff; }
        .candidate-pillbtn.avoid.active { background: #dc2626; border-color: #dc2626; color: #fff; }

        .candidate-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .candidate-pill { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
        .candidate-desc { margin-top: 10px; display: grid; gap: 8px; }
        .candidate-desc-title { font-size: 12px; font-weight: 800; color: #111827; }
        .candidate-desc-body { font-size: 13px; color: #374151; }

        .loading { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.95); padding: 8px 10px; border-radius: 6px; font-size: 14px; z-index: 1000; box-shadow: 0 1px 6px rgba(0,0,0,0.15); display: none; }
        .issues { position: absolute; bottom: 12px; left: 12px; right: 12px; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px 12px; box-shadow: 0 1px 10px rgba(0,0,0,0.12); z-index: 1000; display: none; max-height: 30vh; overflow-y: auto;}
        
        #fatal-error { position: fixed; inset: 0; background: rgba(255,255,255,0.96); display: none; z-index: 9999; padding: 24px; box-sizing: border-box; }
        #fatal-error pre { white-space: pre-wrap; word-break: break-word; background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; overflow: auto; }

        .extras-section { margin-top: 28px; padding-top: 18px; border-top: 1px solid #eaecef; }
        .extras-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
        .extras-title { font-size: 18px; font-weight: 700; margin: 0; }
        .extras-subtitle { font-size: 13px; color: #6b7280; margin: 0; }
        .extras-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .extras-tab { border: 1px solid #e5e7eb; background: #fff; border-radius: 999px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
        .extras-tab.active { background: #111827; color: #fff; border-color: #111827; }
        .extras-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .extras-card { border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; background: #fff; display: flex; flex-direction: column; min-height: 180px; }
        .extras-img { width: 100%; height: 120px; object-fit: cover; background: #f3f4f6; }
        .extras-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
        .extras-row { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
        .extras-name { font-weight: 700; font-size: 14px; line-height: 1.2; margin: 0; }
        .extras-price { font-size: 13px; color: #111827; white-space: nowrap; }
        .extras-desc { font-size: 13px; color: #374151; margin: 0; }
        .extras-meta { font-size: 12px; color: #6b7280; margin: 0; }
        .extras-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .extras-tag { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: #f3f4f6; color: #374151; }
        .extras-actions { display: flex; gap: 10px; margin-top: 6px; }
        .extras-link { font-size: 13px; color: #0366d6; text-decoration: none; }
        .extras-link:hover { text-decoration: underline; }

        @media (max-width: 900px) {
            body { flex-direction: column; height: 100vh; overflow: hidden; }
            .right-panel { order: 0; width: 100%; height: 45vh; flex: 0 0 45vh; }
            #map { height: 100%; }
            .left-panel { order: 1; width: 100%; height: auto; flex: 1 1 auto; overflow-y: auto; border-right: none; border-top: 1px solid #e0e0e0; padding: 18px; }
            .extras-grid { grid-template-columns: 1fr; }
        }

        body.force-mobile { flex-direction: column; height: 100vh; overflow: hidden; }
        body.force-mobile .right-panel { order: 0; width: 100%; height: 45vh; flex: 0 0 45vh; }
        body.force-mobile #map { height: 100%; }
        body.force-mobile .left-panel { order: 1; width: 100%; height: auto; flex: 1 1 auto; overflow-y: auto; border-right: none; border-top: 1px solid #e0e0e0; padding: 18px; }
        body.force-mobile .extras-grid { grid-template-columns: 1fr; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div id="content" class="markdown-body"></div>
    </div>
    <div class="right-panel">
        <div id="loading" class="loading">Searching coordinates...</div>
        <div id="issues" class="issues"></div>
        <div id="map"></div>
    </div>

    <div id="fatal-error">
        <h2>Loading Failed</h2>
        <pre id="fatal-error-text"></pre>
    </div>

    <script id="extras-data" type="application/json">EXTRAS_JSON</script>

    <script>
(function() {
    try {
        if (new URLSearchParams(location.search).get('mobile') === '1') document.body.classList.add('force-mobile');
    } catch {}
    const markdownContent = MARKDOWN_CONTENT_JSON;
    const initialDays = INITIAL_DAYS_JSON;
    let locationBias = null;
    let biasMode = 'none';

    function showFatalError(e) {
        const fatal = document.getElementById('fatal-error');
        if (!fatal) return;
        fatal.style.display = 'block';
        document.getElementById('fatal-error-text').textContent = e && e.stack ? e.stack : String(e);
    }

    function readExtras() {
        const el = document.getElementById('extras-data');
        if (!el) return [];
        try {
            const text = (el.textContent || '').trim();
            if (!text || (text[0] !== '[' && text[0] !== '{')) return [];
            const parsed = JSON.parse(text);
            return Array.isArray(parsed) ? parsed : [];
        } catch {
            return [];
        }
    }

    function normalizeExtrasType(t) {
        const v = String(t || '').toLowerCase();
        if (v.includes('food') || v.includes('美食') || v.includes('snack') || v.includes('restaurant')) return 'food';
        if (v.includes('souvenir') || v.includes('gift') || v.includes('伴手礼') || v.includes('特产')) return 'souvenir';
        return 'all';
    }

    function placeholderDataUrl(title) {
        const t = String(title || '').trim().slice(0, 16) || 'Image';
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#e5e7eb"/><stop offset="1" stop-color="#f3f4f6"/></linearGradient></defs><rect width="100%" height="100%" fill="url(#g)"/><text x="50%" y="52%" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial" font-size="40" fill="#111827">${t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</text></svg>`;
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function renderExtras(items) {
        const list = Array.isArray(items) ? items.filter(Boolean) : [];
        if (!list.length) return;
        const content = document.getElementById('content');
        if (!content) return;

        const section = document.createElement('section');
        section.className = 'extras-section';

        const header = document.createElement('div');
        header.className = 'extras-header';

        const titleWrap = document.createElement('div');
        const title = document.createElement('h2');
        title.className = 'extras-title';
        title.textContent = 'Local Eats & Souvenirs';
        const subtitle = document.createElement('p');
        subtitle.className = 'extras-subtitle';
        subtitle.textContent = 'Reference only: prices/images may vary';
        titleWrap.appendChild(title);
        titleWrap.appendChild(subtitle);

        const tabs = document.createElement('div');
        tabs.className = 'extras-tabs';
        const tabAll = document.createElement('button');
        tabAll.className = 'extras-tab active';
        tabAll.type = 'button';
        tabAll.textContent = 'All';
        const tabFood = document.createElement('button');
        tabFood.className = 'extras-tab';
        tabFood.type = 'button';
        tabFood.textContent = 'Food';
        const tabSouvenir = document.createElement('button');
        tabSouvenir.className = 'extras-tab';
        tabSouvenir.type = 'button';
        tabSouvenir.textContent = 'Souvenirs';
        tabs.appendChild(tabAll);
        tabs.appendChild(tabFood);
        tabs.appendChild(tabSouvenir);

        header.appendChild(titleWrap);
        header.appendChild(tabs);
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'extras-grid';
        section.appendChild(grid);
        content.appendChild(section);

        function setActive(btn) {
            for (const b of tabs.querySelectorAll('button')) b.classList.remove('active');
            btn.classList.add('active');
        }

        function render(type) {
            grid.innerHTML = '';
            const filtered = type === 'all' ? list : list.filter(i => normalizeExtrasType(i.type || i.category) === type);
            for (const item of filtered) {
                const card = document.createElement('article');
                card.className = 'extras-card';

                const img = document.createElement('img');
                img.className = 'extras-img';
                img.loading = 'lazy';
                img.alt = item.name || '';
                try { img.referrerPolicy = 'no-referrer'; } catch {}
                const image = String(item.image || item.imageUrl || '').trim();
                const fallback = placeholderDataUrl(item.name || '');
                img.src = image || fallback;
                img.onerror = () => {
                    img.onerror = null;
                    img.src = fallback;
                };
                card.appendChild(img);

                const body = document.createElement('div');
                body.className = 'extras-body';

                const row = document.createElement('div');
                row.className = 'extras-row';
                const h = document.createElement('h3');
                h.className = 'extras-name';
                h.textContent = item.name || '';
                const p = document.createElement('div');
                p.className = 'extras-price';
                const price = item.price || item.priceRange || '';
                p.textContent = price ? `Price: ${price}` : '';
                row.appendChild(h);
                row.appendChild(p);
                body.appendChild(row);

                const desc = item.desc || item.description || '';
                if (desc) {
                    const d = document.createElement('p');
                    d.className = 'extras-desc';
                    d.textContent = desc;
                    body.appendChild(d);
                }

                const where = item.where || item.location || '';
                if (where) {
                    const m = document.createElement('p');
                    m.className = 'extras-meta';
                    m.textContent = `Where: ${where}`;
                    body.appendChild(m);
                }

                const tags = Array.isArray(item.tags) ? item.tags.slice(0, 6) : [];
                if (tags.length) {
                    const tagWrap = document.createElement('div');
                    tagWrap.className = 'extras-tags';
                    for (const t of tags) {
                        const s = document.createElement('span');
                        s.className = 'extras-tag';
                        s.textContent = String(t);
                        tagWrap.appendChild(s);
                    }
                    body.appendChild(tagWrap);
                }

                const mapUrl = item.mapUrl || item.map || '';
                if (mapUrl) {
                    const actions = document.createElement('div');
                    actions.className = 'extras-actions';
                    const link = document.createElement('a');
                    link.className = 'extras-link';
                    link.href = mapUrl;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    link.textContent = '🗺️ Map';
                    actions.appendChild(link);
                    body.appendChild(actions);
                }

                card.appendChild(body);
                grid.appendChild(card);
            }
        }

        tabAll.addEventListener('click', () => { setActive(tabAll); render('all'); });
        tabFood.addEventListener('click', () => { setActive(tabFood); render('food'); });
        tabSouvenir.addEventListener('click', () => { setActive(tabSouvenir); render('souvenir'); });
        render('all');
    }

    function initCandidateSelection() {
        const toolbar = document.getElementById('candidate-toolbar');
        if (!toolbar) return;
        const content = document.getElementById('content');
        if (!content) return;

        const mustCountEl = document.getElementById('candidate-must-count');
        const avoidCountEl = document.getElementById('candidate-avoid-count');
        const copyBtn = document.getElementById('candidate-copy');
        const clearBtn = document.getElementById('candidate-clear');

        function readState() {
            const state = { must: [], avoid: [] };
            for (const card of content.querySelectorAll('.candidate-card')) {
                const idx = parseInt(card.getAttribute('data-idx') || '', 10);
                if (!Number.isFinite(idx)) continue;
                if (card.classList.contains('candidate-must')) state.must.push(idx);
                else if (card.classList.contains('candidate-avoid')) state.avoid.push(idx);
            }
            state.must.sort((a, b) => a - b);
            state.avoid.sort((a, b) => a - b);
            return state;
        }

        function update() {
            const state = readState();
            if (mustCountEl) mustCountEl.textContent = String(state.must.length);
            if (avoidCountEl) avoidCountEl.textContent = String(state.avoid.length);
            const disabled = state.must.length === 0 && state.avoid.length === 0;
            if (copyBtn) copyBtn.disabled = disabled;
            if (clearBtn) clearBtn.disabled = disabled;
        }

        async function copy() {
            const state = readState();
            const lines = [];
            if (state.must.length) lines.push(`必去：${state.must.join(',')}`);
            if (state.avoid.length) lines.push(`不想去：${state.avoid.join(',')}`);
            lines.push('未选择：随缘安排（顺路就去，否则就不去）');
            const text = lines.join('\n');
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
            } catch {
                try { window.prompt('复制下面这段：', text); } catch {}
            }
        }

        function clear() {
            for (const card of content.querySelectorAll('.candidate-card')) {
                card.classList.remove('candidate-must');
                card.classList.remove('candidate-avoid');
                for (const b of card.querySelectorAll('.candidate-pillbtn')) b.classList.remove('active');
            }
            update();
        }

        function setCardState(card, state) {
            card.classList.remove('candidate-must');
            card.classList.remove('candidate-avoid');
            for (const b of card.querySelectorAll('.candidate-pillbtn')) b.classList.remove('active');
            if (state === 'must') {
                card.classList.add('candidate-must');
                const btn = card.querySelector('.candidate-pillbtn.must');
                if (btn) btn.classList.add('active');
            } else if (state === 'avoid') {
                card.classList.add('candidate-avoid');
                const btn = card.querySelector('.candidate-pillbtn.avoid');
                if (btn) btn.classList.add('active');
            }
        }

        content.addEventListener('click', e => {
            const btn = e.target.closest('.candidate-pillbtn');
            if (!btn) return;
            e.preventDefault();
            const card = btn.closest('.candidate-card');
            if (!card) return;
            const isMust = btn.classList.contains('must');
            const isAvoid = btn.classList.contains('avoid');
            if (!isMust && !isAvoid) return;
            const next = btn.classList.contains('active') ? 'none' : (isMust ? 'must' : 'avoid');
            setCardState(card, next);
            update();
        });
        if (copyBtn) copyBtn.addEventListener('click', copy);
        if (clearBtn) clearBtn.addEventListener('click', clear);
        update();
    }

    async function init() {
        try {
            if (typeof L === 'undefined' || typeof gcoord === 'undefined' || typeof marked === 'undefined') {
                throw new Error('Missing resources. Please ensure internet access for CDN.');
            }

            document.getElementById('content').innerHTML = marked.parse(markdownContent);
            renderExtras(readExtras());
            initCandidateSelection();

            const map = L.map('map').setView([0, 0], 2);
            const tileMode = (() => {
                try { return new URLSearchParams(location.search).get('tile') || ''; } catch { return ''; }
            })();
            const mode = tileMode.toLowerCase();
            const tile = mode === 'google'
                ? L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], attribution: '&copy; Google' })
                : mode === 'osm'
                    ? L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { subdomains: ['a', 'b', 'c'], maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' })
                    : L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: 'Tiles &copy; Esri' });
            tile.addTo(map);

            const dayColors = ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#e74c3c', '#1abc9c', '#34495e'];
            const markersMap = {};
            const allLatlngs = [];
            const cacheKey = 'travel-planner:geo-cache:intl:v4';
            const cache = (() => {
                try { return JSON.parse(localStorage.getItem(cacheKey) || '{}') || {}; } catch { return {}; }
            })();

            function saveCache() {
                try { localStorage.setItem(cacheKey, JSON.stringify(cache)); } catch {}
            }

            function normalize(s) {
                return String(s || '').replace(/\+/g, ' ').replace(/\s+/g, '').toLowerCase().trim();
            }

            function createDayIcon(dayIndex, color) {
                return L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background-color:${color}; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3);">D${dayIndex + 1}</div>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                });
            }

            function createCandidateIcon(idx, label) {
                const safeIdx = Number.isFinite(idx) ? idx : '';
                const safeLabel = String(label || '').trim();
                const short = safeLabel.length > 18 ? safeLabel.slice(0, 18) + '…' : safeLabel;
                const chip = `<div style="display:inline-flex; align-items:center; gap:6px; padding:6px 8px; border-radius:999px; background:rgba(17,24,39,0.92); color:#fff; border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,0.25); max-width:220px;">` +
                    `<span style="display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:999px; background:rgba(255,255,255,0.18); font-weight:900; font-size:12px; flex:0 0 auto;">${safeIdx}</span>` +
                    `<span style="font-weight:800; font-size:12px; line-height:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px;">${short.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>` +
                    `</div>`;
                return L.divIcon({
                    className: 'custom-div-icon',
                    html: chip,
                    iconSize: [240, 34],
                    iconAnchor: [20, 17]
                });
            }

            function unpackPoint(p, fallbackIdx) {
                if (typeof p === 'string') {
                    const s = p.replace(/\+/g, ' ').trim();
                    return { query: s, label: s, idx: null };
                }
                if (p && typeof p === 'object') {
                    const q = String(p.query || p.q || p.name || '').replace(/\+/g, ' ').trim();
                    const label = String(p.label || p.title || p.name || q).replace(/\+/g, ' ').trim();
                    const idx = Number.isFinite(Number(p.idx)) ? Number(p.idx) : (Number.isFinite(fallbackIdx) ? fallbackIdx : null);
                    return { query: q, label, idx };
                }
                const s = String(p || '').replace(/\+/g, ' ').trim();
                return { query: s, label: s, idx: null };
            }

            function haversineKm(a, b) {
                const toRad = (deg) => deg * Math.PI / 180;
                const R = 6371;
                const dLat = toRad(b.lat - a.lat);
                const dLon = toRad(b.lon - a.lon);
                const lat1 = toRad(a.lat);
                const lat2 = toRad(b.lat);
                const s = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * (Math.sin(dLon / 2) ** 2);
                return 2 * R * Math.asin(Math.sqrt(s));
            }

            async function fetchPhoton(q, bias = null) {
                try {
                    let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=10`;
                    if (bias) url += `&lat=${bias.lat}&lon=${bias.lon}&location_bias_scale=0.8`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (!data.features?.length) return null;
                    if (!bias) {
                        const c = data.features[0].geometry.coordinates;
                        return { lon: c[0], lat: c[1] };
                    }
                    let best = null;
                    let bestDist = Infinity;
                    for (const f of data.features) {
                        const c = f?.geometry?.coordinates;
                        if (!c || c.length < 2) continue;
                        const cand = { lon: c[0], lat: c[1] };
                        const dist = haversineKm(bias, cand);
                        if (dist < bestDist) {
                            bestDist = dist;
                            best = cand;
                        }
                    }
                    return best;
                } catch { return null; }
            }

            async function resolveCoords(query) {
                const q = query.replace(/\+/g, ' ').trim();
                if (cache[q]) return cache[q];
                const hit = await fetchPhoton(q, locationBias);
                if (hit) {
                    cache[q] = hit;
                    saveCache();
                    if (biasMode !== 'route') {
                        locationBias = { lat: hit.lat, lon: hit.lon };
                        biasMode = 'route';
                    }
                    return hit;
                }
                return null;
            }

            if (initialDays?.length) {
                document.getElementById('loading').style.display = 'block';
                const unresolved = [];
                for (let d = 0; d < initialDays.length; d++) {
                    const color = dayColors[d % dayColors.length];
                    const dayPoints = [];
                    for (const name of initialDays[d]) {
                        const pt = unpackPoint(name, d + 1);
                        const r = await resolveCoords(pt.query);
                        if (r) {
                            const pos = [r.lat, r.lon];
                            const icon = pt && pt.idx ? createCandidateIcon(pt.idx, pt.label) : createDayIcon(d, color);
                            const marker = L.marker(pos, { icon }).addTo(map);
                            const popupTitle = pt && pt.idx ? `${pt.idx}. ${pt.label}` : `D${d+1}: ${pt.label}`;
                            marker.bindPopup(`<b>${popupTitle}</b>`);
                            markersMap[normalize(pt.query)] = marker;
                            markersMap[normalize(pt.label)] = marker;
                            dayPoints.push(pos);
                            allLatlngs.push(pos);
                        } else {
                            unresolved.push(pt.query || pt.label || String(name));
                        }
                    }
                    if (dayPoints.length > 1) L.polyline(dayPoints, { color, weight: 4, opacity: 0.7 }).addTo(map);
                }
                if (allLatlngs.length) map.fitBounds(allLatlngs, { padding: [50, 50] });
                document.getElementById('loading').style.display = 'none';
                if (unresolved.length) {
                    const el = document.getElementById('issues');
                    el.innerHTML = `<div class="issues-title">Unresolved places (cannot be connected):</div><ul>${unresolved.map(n => `<li>${n}</li>`).join('')}</ul>`;
                    el.style.display = 'block';
                }
            }

            document.getElementById('content').addEventListener('click', async e => {
                const a = e.target.closest('a');
                if (!a) return;
                const isExternal = a.textContent.includes('🗺️') || a.textContent.toLowerCase().includes('map');
                const isMapLink = a.href.includes('google.com/maps') || a.href.includes('amap.com') || a.href.includes('maps');
                if (!isMapLink) return;

                if (!isExternal) {
                    e.preventDefault();
                    let query = null;
                    try {
                        const url = new URL(a.href);
                        query = url.searchParams.get('query') || url.searchParams.get('q');
                    } catch {}
                    if (!query) return;

                    const normQuery = normalize(query);
                    let targetMarker = markersMap[normQuery];
                    if (!targetMarker) {
                        const key = Object.keys(markersMap).find(k => k.includes(normQuery) || normQuery.includes(k));
                        if (key) targetMarker = markersMap[key];
                    }

                    if (targetMarker) {
                        map.flyTo(targetMarker.getLatLng(), 16);
                        setTimeout(() => targetMarker.openPopup(), 500);
                    } else {
                        document.getElementById('loading').textContent = 'Searching...';
                        document.getElementById('loading').style.display = 'block';
                        const r = await resolveCoords(query);
                        document.getElementById('loading').style.display = 'none';
                        if (r) {
                            const marker = L.marker([r.lat, r.lon]).addTo(map);
                            marker.bindPopup(`<b>${query}</b>`).openPopup();
                            map.flyTo([r.lat, r.lon], 16);
                        }
                    }
                } else {
                    a.target = "_blank";
                }
            });

        } catch (e) { showFatalError(e); }
    }

    if (document.readyState === 'complete') init();
    else window.addEventListener('load', init);
})();
    </script>
</body>
</html>
