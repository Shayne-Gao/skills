<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip_Plan_Template_Intl</title>
    <!-- 使用在线 CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; display: flex; height: 100vh; overflow: hidden; }
        .left-panel { width: 45%; height: 100%; overflow-y: auto; background: white; padding: 30px; box-sizing: border-box; border-right: 1px solid #e0e0e0; }
        .right-panel { width: 55%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; background: #eef3f7; }

        .markdown-body { font-size: 15px; line-height: 1.6; color: #333; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
        .markdown-body table th, .markdown-body table td { border: 1px solid #dfe2e5; padding: 8px 12px; }
        .markdown-body table th { background-color: #f6f8fa; font-weight: 600; }
        .markdown-body table tr:nth-child(2n) { background-color: #f6f8fa; }
        .markdown-body a { color: #0366d6; text-decoration: none; font-weight: 500; cursor: pointer; }
        .markdown-body a:hover { text-decoration: underline; }

        .loading { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.95); padding: 8px 10px; border-radius: 6px; font-size: 14px; z-index: 1000; box-shadow: 0 1px 6px rgba(0,0,0,0.15); display: none; }
        .issues { position: absolute; bottom: 12px; left: 12px; right: 12px; background: rgba(255,255,255,0.95); border-radius: 8px; padding: 10px 12px; box-shadow: 0 1px 10px rgba(0,0,0,0.12); z-index: 1000; display: none; }
        #fatal-error { position: fixed; inset: 0; background: rgba(255,255,255,0.96); display: none; z-index: 9999; padding: 24px; box-sizing: border-box; }
        #fatal-error pre { white-space: pre-wrap; word-break: break-word; background: #111827; color: #f9fafb; padding: 16px; border-radius: 8px; overflow: auto; }
    </style>
</head>
<body>
    <div class="left-panel">
        <div id="content" class="markdown-body"></div>
    </div>
    <div class="right-panel">
        <div id="loading" class="loading">Searching coordinates...</div>
        <div id="issues" class="issues"></div>
        <div id="map"></div>
    </div>

    <div id="fatal-error">
        <h2>Loading Failed</h2>
        <pre id="fatal-error-text"></pre>
    </div>

    <script>
const markdownContent = `MARKDOWN_CONTENT_PLACEHOLDER`;
const initialPlaces = INITIAL_PLACES_PLACEHOLDER;

try {
    document.getElementById('content').innerHTML = marked.parse(markdownContent);
} catch (e) {
    showFatalError(e);
}

// 国际版使用 Google Maps 街道底图 (WGS84)
const map = L.map('map').setView([0, 0], 2);
L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
    attribution: '&copy; Google Maps'
}).addTo(map);

const cacheKey = 'travel-planner:geo-cache:intl:v1';
const cache = (() => {
    try { return JSON.parse(localStorage.getItem(cacheKey) || '{}') || {}; } 
    catch { return {}; }
})();

function saveCache() {
    try { localStorage.setItem(cacheKey, JSON.stringify(cache)); } 
    catch {}
}

const markersMap = {};
const latlngs = [];
let pendingTasks = 0;

function setLoading(text) {
    const el = document.getElementById('loading');
    el.style.display = 'block';
    el.textContent = text;
}
function clearLoading() {
    if (pendingTasks <= 0) document.getElementById('loading').style.display = 'none';
}
function showFatalError(e) {
    const fatal = document.getElementById('fatal-error');
    fatal.style.display = 'block';
    document.getElementById('fatal-error-text').textContent = e && e.stack ? e.stack : String(e);
}

async function fetchPhoton(q) {
    const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=1`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.features || !data.features.length) return null;
    const coords = data.features[0].geometry.coordinates;
    return { lon: coords[0], lat: coords[1] };
}

async function resolveCoords(queryName) {
    const q = queryName.replace(/\+/g, ' ').trim();
    if (cache[q]) return cache[q];

    try {
        const hit = await fetchPhoton(q);
        if (hit) {
            cache[q] = hit;
            saveCache();
            return hit;
        }
    } catch {}
    return null;
}

async function loadInitialRoute() {
    if (!Array.isArray(initialPlaces)) return;
    pendingTasks++;
    setLoading('Locating attractions...');
    for (const placeName of initialPlaces) {
        const r = await resolveCoords(placeName);
        if (r) {
            const pos = [r.lat, r.lon];
            const marker = L.marker(pos).addTo(map);
            marker.bindPopup(`<b>${placeName.split(',')[0]}</b>`);
            markersMap[placeName] = marker;
            latlngs.push(pos);
        }
    }
    if (latlngs.length > 0) {
        L.polyline(latlngs, { color: '#3498db', weight: 4, dashArray: '5, 10' }).addTo(map);
        map.fitBounds(L.latLngBounds(latlngs), { padding: [50, 50] });
    }
    pendingTasks--;
    clearLoading();
}

document.querySelectorAll('.markdown-body a').forEach((a) => {
    a.addEventListener('click', async function (e) {
        if (!this.href.includes('maps') && !this.href.includes('amap')) return;
        e.preventDefault();
        const urlObj = new URL(this.href);
        const q = urlObj.searchParams.get('query') || urlObj.searchParams.get('q');
        if (!q) return;
        
        const normalizedQ = q.replace(/\+/g, ' ');
        if (markersMap[normalizedQ]) {
            map.flyTo(markersMap[normalizedQ].getLatLng(), 16);
            markersMap[normalizedQ].openPopup();
        } else {
            setLoading('Locating...');
            const r = await resolveCoords(normalizedQ);
            clearLoading();
            if (r) {
                const pos = [r.lat, r.lon];
                const marker = L.marker(pos).addTo(map);
                marker.bindPopup(`<b>${normalizedQ.split(',')[0]}</b>`);
                markersMap[normalizedQ] = marker;
                map.flyTo(pos, 16);
                marker.openPopup();
            } else {
                window.open(this.href, '_blank');
            }
        }
    });
});

loadInitialRoute();
    </script>
</body>
</html>
